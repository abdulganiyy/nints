name: nints

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - "./docker/nginx/conf.d/default.dev.conf:/etc/nginx/conf.d/default.conf"
  postgres:
    image: postgres
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: my_database
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
